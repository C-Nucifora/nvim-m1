name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# CI only reads the repo (and downloads public release assets); no writes needed.
permissions:
  contents: read

jobs:
  stylua:
    name: Lua Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ tests/

  test:
    name: Tests (Neovim ${{ matrix.neovim }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v6

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Check out plenary.nvim
        uses: actions/checkout@v6
        with:
          repository: nvim-lua/plenary.nvim
          path: deps/plenary.nvim

      - name: Install m1 toolchain binaries (best-effort, enables e2e specs)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$HOME/.local/bin"
          for tool in m1-lint m1-fmt m1-lsp; do
            gh release download --repo "C-Nucifora/$tool" \
              --pattern "$tool-x86_64-unknown-linux-gnu" \
              -O "$HOME/.local/bin/$tool" 2>/dev/null \
              && chmod +x "$HOME/.local/bin/$tool" || true
          done
          # m1-project lives under nedlane/ — its e2e create-channel spec runs
          # only when the binary is present (skips otherwise).
          gh release download --repo "nedlane/m1-project" \
            --pattern "m1-project-x86_64-unknown-linux-gnu" \
            -O "$HOME/.local/bin/m1-project" 2>/dev/null \
            && chmod +x "$HOME/.local/bin/m1-project" || true
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run tests
        env:
          PLENARY_PATH: ${{ github.workspace }}/deps/plenary.nvim
        run: scripts/test.sh
