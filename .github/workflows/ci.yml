name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# CI only reads the repo (and downloads public release assets); no writes needed.
permissions:
  contents: read

# Cancel superseded runs of the same branch/PR: every push otherwise queues
# a full duplicate job matrix (m1-tools#27).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stylua:
    name: Lua Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ tests/

  test:
    name: Tests (Neovim ${{ matrix.neovim }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v6

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Check out plenary.nvim
        uses: actions/checkout@v6
        with:
          repository: nvim-lua/plenary.nvim
          path: deps/plenary.nvim

      # The m1 grammar sources, so tests/parser_spec.lua can compile the parser
      # and assert real highlighting — guarding the nvim-treesitter-main
      # regression where the parser was never built. ubuntu-latest already ships
      # a C compiler (cc/gcc), which the spec needs.
      - name: Check out tree-sitter-m1
        uses: actions/checkout@v6
        with:
          repository: C-Nucifora/tree-sitter-m1
          path: deps/tree-sitter-m1

      # The e2e specs run against the SAME pinned, provenance-verified
      # toolchain users get (#83): versions/repos are read from
      # lua/nvim-m1/install.lua (the single source of truth), every download
      # is attestation-verified, and any failure fails the job — a silent
      # skip used to turn e2e coverage off while staying green.
      - name: Install m1 toolchain binaries (pinned, verified - e2e specs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          pin() { # pin <tool> <file-section regex> -> first quoted value for the tool key
            sed -n "s/^  \\[\"$1\"\\] = \"\\([^\"]*\\)\",\\?$/\\1/p" lua/nvim-m1/install.lua
          }
          for tool in m1-lsp m1-fmt m1-lint m1-project; do
            version=$(pin "$tool" | sed -n 1p)
            repo=$(pin "$tool" | sed -n 2p)
            if [ -z "$version" ] || [ -z "$repo" ]; then
              echo "::error::could not read pin/repo for $tool from install.lua"; exit 1
            fi
            asset="$tool-x86_64-unknown-linux-gnu"
            gh release download "$version" --repo "$repo" \
              --pattern "$asset" -O "$HOME/.local/bin/$tool" --clobber
            if out=$(gh attestation verify "$HOME/.local/bin/$tool" --repo "$repo" 2>&1); then
              echo "verified $tool $version ($repo)"
            else
              echo "::error::provenance verification failed for $tool $version"
              printf '%s\n' "$out"
              exit 1
            fi
            chmod +x "$HOME/.local/bin/$tool"
            "$HOME/.local/bin/$tool" --version || true
          done
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run tests
        env:
          PLENARY_PATH: ${{ github.workspace }}/deps/plenary.nvim
          TREE_SITTER_M1_PATH: ${{ github.workspace }}/deps/tree-sitter-m1
        run: scripts/test.sh
